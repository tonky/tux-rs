name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test / Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check no-systemd build (non-systemd compatibility)
        run: |
          cargo check -p tux-daemon --no-default-features --features tcc-compat
          cargo clippy -p tux-daemon --no-default-features --features tcc-compat -- -D warnings

      - name: Install dbus
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dbus

      - name: Test (all, including integration)
        run: dbus-run-session -- cargo test --workspace

  runit-smoke:
    name: Runit Smoke (Container)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build runit smoke image
        run: docker build -f containers/runit-smoke/Dockerfile -t tux-rs-runit-smoke .

      - name: Run runit smoke (pass 1)
        run: docker run --rm --name tux-rs-runit-smoke-1 tux-rs-runit-smoke

      - name: Run runit smoke (pass 2)
        run: docker run --rm --name tux-rs-runit-smoke-2 tux-rs-runit-smoke
