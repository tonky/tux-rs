title = "Follow-up tasks for: Remove kmod, use tuxedo-drivers"

[[task]]
id = "f001"
description = "Verify with user if `stage-*` files capture the correct implementation scope."
status = "closed"
priority = "high"
context = "Created stage-1.md through stage-6.md per the high level plan."
reasoning = "We must iterate and agree on plan and stage details before starting to implement Stage 1, per AGENTS.md rules."

[[task]]
id = "f002"
description = "Update charging control sysfs paths for tuxedo-drivers: tux-daemon/src/charging/clevo.rs and charging/uniwill.rs still reference tux-kmod paths (/sys/devices/platform/tuxedo-clevo, /tuxedo-uniwill). After Stage 5 (kmod removal), these must be updated to tuxedo-drivers chardev/WMI paths."
status = "closed"
priority = "high"
context = "Resolved in Stage 6 follow-up. Both charging backends now use /sys/devices/platform/tuxedo_keyboard. Clevo attributes renamed to charge_control_start/end_threshold. Uniwill attributes moved to charging_profile/charging_profile and charging_priority/charging_prio subgroups; priority value 'charge' corrected to 'charge_battery' per driver source."
reasoning = "Without this, Clevo flexicharger and Uniwill charge profiles will break when tux-kmod is removed in Stage 5."

[[task]]
id = "f003"
description = "Implement NB04 keyboard backlight control via tuxedo_nb04_kbd_backlight LED subsystem. Stage 3 spec required integrating standard Linux LED class at /sys/class/leds/tuxedo_nb04_kbd_backlight/."
status = "closed"
priority = "medium"
context = "Already implemented. The tuxedo_nb04_kbd_backlight driver exposes LED class as 'rgb:kbd_backlight' (not 'tuxedo_nb04_kbd_backlight' as originally assumed). discover_sysfs_keyboards() in hid/discover.rs already scans /sys/class/leds/ for 'rgb:kbd_backlight*' entries and opens them via SysfsRgbKeyboard. In main.rs, sysfs discovery is the fallback when no ITE HID device is found — which is the case for NB04 since it uses WMI firmware, not a USB ITE HID device. No daemon changes needed."
reasoning = "NB04 (Sirius series) users cannot control keyboard backlight without this. Medium priority because NB04 already lacks fan PWM control so impact surface is smaller."

[[task]]
id = "f004"
description = "Perform a systematic sweep of tuxedo-drivers DMI match tables vs our device_table.rs to verify no SKUs are missing. Produce a reconciliation artifact (a table in stage-4.md or a separate file) documenting which vendor SKUs are matched and why others are absent."
status = "closed"
priority = "medium"
context = "Sweep performed. Vendor tuxedo-drivers uses DMI_PRODUCT_SKU for 33 SKUs across all platforms. All 33 are present in tux-core/src/device_table.rs. Extra entries IBP14I07, IBP15I07, AURA15GEN1T, AURA15GEN2T are legacy pre-tuxedo-drivers models — they are not in vendor DMI tables but have correct platform entries and use platform-level fallback appropriately. feature_support_matrix.md updated."
reasoning = "Without this artifact, we cannot claim full TCC parity. Needed before Stage 8 (polish/packaging)."

[[task]]
id = "f005"
description = "Investigate and document tuxedo-drivers charging sysfs interface layout. Specifically: what sysfs paths does tuxedo_keyboard expose for flexicharger threshold and Uniwill charge profiles? Are they under /sys/devices/platform/tuxedo_keyboard/ or elsewhere?"
status = "closed"
priority = "high"
context = "Investigated vendor/tuxedo-drivers/src/clevo_keyboard.h and uniwill_keyboard.h. Both share platform device name 'tuxedo_keyboard' (DRIVER_NAME constant in tuxedo_keyboard_common.h). Clevo: charge_control_start_threshold, charge_control_end_threshold, charge_type (all directly under device). Uniwill: charging_profile/charging_profile and charging_priority/charging_prio (sysfs_create_group subgroups). Priority values: 'charge_battery' | 'performance'."
reasoning = "Cannot fix charging control (f002) without knowing the correct paths."
