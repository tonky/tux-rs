PACKAGE_NAME="tux-kmod"
PACKAGE_VERSION="0.1.0"
AUTOINSTALL="yes"

# Module 0: tuxedo_ec (NB05 EC raw access)
BUILT_MODULE_NAME[0]="tuxedo_ec"
BUILT_MODULE_LOCATION[0]="tuxedo-ec/"
DEST_MODULE_LOCATION[0]="/extra"

# Module 1: tuxedo_uniwill (Unified Uniwill platform driver)
BUILT_MODULE_NAME[1]="tuxedo_uniwill"
BUILT_MODULE_LOCATION[1]="tuxedo-uniwill/"
DEST_MODULE_LOCATION[1]="/extra"

# Module 2: tuxedo_clevo (Clevo WMI/DSM fan control)
BUILT_MODULE_NAME[2]="tuxedo_clevo"
BUILT_MODULE_LOCATION[2]="tuxedo-clevo/"
DEST_MODULE_LOCATION[2]="/extra"

# Module 3: tuxedo_tuxi (TUXI ACPI fan control)
BUILT_MODULE_NAME[3]="tuxedo_tuxi"
BUILT_MODULE_LOCATION[3]="tuxedo-tuxi/"
DEST_MODULE_LOCATION[3]="/extra"

# Module 4: tuxedo_nb04 (NB04 WMI BS sensors/profile)
BUILT_MODULE_NAME[4]="tuxedo_nb04"
BUILT_MODULE_LOCATION[4]="tuxedo-nb04/"
DEST_MODULE_LOCATION[4]="/extra"

MAKE="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-ec modules && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-uniwill modules && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-clevo modules && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-tuxi modules && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-nb04 modules"

CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-ec clean && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-uniwill clean && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-clevo clean && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-tuxi clean && make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/tuxedo-nb04 clean"
